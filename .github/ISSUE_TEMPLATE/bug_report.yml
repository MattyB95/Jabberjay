name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible — it helps us fix things faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I call jj.detect() with model='HuBERT', it raises..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or CLI command that reproduces the issue.
      render: python
      placeholder: |
        from Jabberjay import Jabberjay
        jj = Jabberjay()
        jj.detect("audio.wav", model="HuBERT")
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: "Should return a DetectionResult with label='Bonafide'."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour / error
      description: Paste the full traceback if there is one.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Jabberjay version
      placeholder: "0.0.5 (run: python -c 'import Jabberjay; print(Jabberjay.__version__)')"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.4"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — audio format, model being used, etc.
