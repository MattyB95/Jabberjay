# CI / CD pipeline
#
# Branches
# --------
# develop  → lint + test + publish a pre-release (.devN) to TestPyPI
# main     → lint + test + publish the release version to PyPI
#
# Required GitHub secrets
# -----------------------
# TEST_PYPI_API_TOKEN  – token from https://test.pypi.org/manage/account/token/
# PYPI_API_TOKEN       – token from https://pypi.org/manage/account/token/
#
# Version strategy
# ----------------
# Bump `version` in pyproject.toml before merging to main.
# Each push to develop auto-appends .dev<RUN_NUMBER> so TestPyPI always
# receives a unique, sortable pre-release (e.g. 0.1.0.dev42).

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Lint & type-check ──────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with black
        run: uv run black --check .

      - name: Type-check with ty
        run: uv run ty check src/

  # ── Test matrix ────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Test with pytest
        run: uv run pytest --cov-fail-under=80

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  # ── Publish pre-release to TestPyPI (develop only) ────────────────────────
  publish-test:
    name: Publish to TestPyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Inject .devN version suffix
        run: |
          CURRENT=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          DEV="${CURRENT}.dev${GITHUB_RUN_NUMBER}"
          sed -i "s/version = \"${CURRENT}\"/version = \"${DEV}\"/" pyproject.toml
          echo "Publishing version: ${DEV}"

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}

  # ── Publish release to PyPI (main only) ───────────────────────────────────
  publish:
    name: Publish to PyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
