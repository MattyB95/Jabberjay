[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "Jabberjay"
version = "0.0.4"
description = "🦜 Synthetic Voice Detection"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Matthew Boakes", email = "mboakes@turing.ac.uk" },
]
keywords = [
    "Synthetic",
    "Voice",
    "Detection",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "huggingface-hub",
    "joblib",
    "loguru",
    "librosa",
    "matplotlib",
    "numpy",
    "Pillow",
    "PyYAML",
    "scikit-learn",
    "soundfile",
    "torch",
    "transformers",
]

[project.urls]
"Homepage" = "https://github.com/MattyB95/Jabberjay"
"Bug Tracker" = "https://github.com/MattyB95/Jabberjay/issues"

[project.scripts]
jabberjay = "Jabberjay.jabberjay:main"

[dependency-groups]
dev = [
    "black",
    "pre-commit",
    "pytest",
    "ruff",
]

[tool.black]
line-length = 88
target-version = ["py310"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
# E4/E7/E9 and F are safe alongside black; I adds isort; avoid E1-E3/W which overlap with black
select = ["E4", "E7", "E9", "F", "I"]

[tool.hatch.build.targets.wheel]
packages = ["src/Jabberjay"]
