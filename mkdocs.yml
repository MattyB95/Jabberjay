site_name: Jabberjay
site_description: One API. Every state-of-the-art synthetic voice detector.
site_url: https://mattyb95.github.io/Jabberjay
repo_url: https://github.com/MattyB95/Jabberjay
repo_name: MattyB95/Jabberjay
copyright: MIT License

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            docstring_style: google
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Models: models.md
  - CLI: cli.md
  - API Reference: api-reference.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
